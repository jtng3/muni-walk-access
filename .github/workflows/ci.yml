name: CI

on:
  push:
    branches: [main]
    paths:
      - "pipeline/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "pipeline/**"
      - ".github/workflows/ci.yml"

jobs:
  pipeline:
    name: Pipeline — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      # Geospatial wheels (osmnx/pandana/geopandas) need system libs.
      - name: Install system geo deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev \
            libgeos-dev \
            libproj-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: pipeline/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra geospatial

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Pytest
        run: uv run pytest -q
