version: "1.0"

frequency:
  bins:
    - { id: high,   max_headway_min: 10 }
    - { id: medium, max_headway_min: 20 }
    - { id: low,    max_headway_min: null }
  peak_window: am_peak
  peak_am_start: "07:00"
  peak_am_end: "09:00"
  time_windows:
    - { key: am_peak,   label: "AM Rush",    start: "06:00", end: "09:00" }
    - { key: midday,    label: "Midday",     start: "09:00", end: "15:00" }
    - { key: pm_peak,   label: "PM Rush",    start: "15:00", end: "19:00" }
    - { key: evening,   label: "Evening",    start: "19:00", end: "00:00" }
    - { key: overnight, label: "Overnight",  start: "00:00", end: "06:00" }

grid:
  frequency_threshold_min: [4, 6, 8, 10, 12, 15, 20]
  walking_minutes: [3, 5, 7, 10, 12, 15]
  defaults: { frequency_min: 10, walking_min: 5 }

walking:
  pace_min_per_mile: 20.0

# Nearest-stop routing search radius. Addresses whose closest stop is farther
# than this are treated as unreachable (null distance in output). Tune per city.
routing:
  max_distance_m: 5000.0

residential_filter:
  parcel_dataset_id: "TBD_FROM_LUKE"
  use_codes_residential: ["SRES", "MRES"]  # Actual wv5m-vpq2 codes; update when Luke confirms dataset

lenses:
  - { id: analysis_neighborhoods, datasf_id: j2bu-swwd, label: "Analysis Neighborhoods" }
  - { id: ej_communities,         datasf_id: y6ci-vpnb, label: "Environmental Justice Communities" }
  - { id: equity_strategy,        datasf_id: my8t-jqzp, label: "SFMTA Equity Strategy Neighborhoods" }

validation:
  ground_truth_file: "tests/fixtures/ground_truth_addresses.yaml"
  pass_threshold: 0.90

dev:
  sample_size: null

ingest:
  cache_ttl_days: 30
  cache_dir: ".cache"

networks:
  osm_place: "San Francisco, California, USA"
  osm_network_type: "walk"
